<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>NeuralCity</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="titlebar">
      <div class="brand">
        <span class="logo-mark"></span>
        <span class="brand-text">NeuralCity</span>
      </div>
      <nav class="tabs" id="tabs">
        <button class="tab active" data-tab="networks">Networks</button>
        <button class="tab" data-tab="train">Train</button>
        <button class="tab" data-tab="infer">Inference</button>
        <button class="tab" data-tab="api">API</button>
        <button class="tab" data-tab="script">Script</button>
        <button class="tab" data-tab="docs">Docs</button>
      </nav>
      <div class="header-actions">
        <button class="btn ghost" id="btn-import">Import</button>
        <button class="btn ghost" id="btn-export">Export</button>
      </div>
    </header>

    <main class="workspace">
      <aside class="sidebar">
        <div class="sidebar-head">
          <div class="sidebar-title">Networks</div>
          <button class="btn primary sm" id="btn-new">+ New</button>
        </div>
        <div class="network-list" id="network-list"></div>
        <div class="sidebar-foot">
          <div class="sys-info" id="sys-info"></div>
        </div>
      </aside>

      <section class="content" id="content">
        <!-- Panels rendered by view.js -->
      </section>
    </main>

    <footer class="statusbar">
      <div class="status-item" id="status-left">Ready</div>
      <div class="status-item" id="status-right"></div>
    </footer>

    <!-- New network modal -->
    <div class="modal" id="modal-new" hidden>
      <div class="modal-panel">
        <div class="modal-head">
          <div class="modal-title">Create Network</div>
          <button class="icon-btn" data-close-modal="modal-new">✕</button>
        </div>
        <div class="modal-body">
          <label class="field">
            <span>Name</span>
            <input id="new-name" type="text" placeholder="My Network" />
          </label>
          <label class="field">
            <span>Type</span>
            <select id="new-kind">
              <option value="classifier">Classifier (labels in, class out)</option>
              <option value="regressor">Regressor (vector in, vector out)</option>
              <option value="charLM">Character Language Model (free-form text)</option>
              <option value="chat">Chat Assistant (user → assistant pairs)</option>
            </select>
          </label>
          <div class="template-grid" id="template-grid"></div>
        </div>
        <div class="modal-foot">
          <button class="btn ghost" data-close-modal="modal-new">Cancel</button>
          <button class="btn primary" id="btn-create">Create</button>
        </div>
      </div>
    </div>

    <!-- Generic confirm modal -->
    <div class="modal" id="modal-confirm" hidden>
      <div class="modal-panel sm">
        <div class="modal-head">
          <div class="modal-title" id="confirm-title">Confirm</div>
        </div>
        <div class="modal-body">
          <div id="confirm-body"></div>
        </div>
        <div class="modal-foot">
          <button class="btn ghost" id="confirm-no">Cancel</button>
          <button class="btn primary" id="confirm-yes">OK</button>
        </div>
      </div>
    </div>

    <!-- Backup modal -->
    <div class="modal" id="modal-backup" hidden>
      <div class="modal-panel">
        <div class="modal-head">
          <div class="modal-title">Backups — <span id="backup-net-name"></span></div>
          <button class="icon-btn" data-close-modal="modal-backup">✕</button>
        </div>
        <div class="modal-body" id="backup-list-body" style="max-height:420px;overflow-y:auto;"></div>
        <div class="modal-foot">
          <button class="btn ghost" data-close-modal="modal-backup">Close</button>
        </div>
      </div>
    </div>

    <!-- Passphrase modal -->
    <div class="modal" id="modal-pass" hidden>
      <div class="modal-panel sm">
        <div class="modal-head">
          <div class="modal-title" id="pass-title">Passphrase</div>
        </div>
        <div class="modal-body">
          <label class="field">
            <span id="pass-prompt">Enter passphrase</span>
            <input id="pass-input" type="password" />
          </label>
        </div>
        <div class="modal-foot">
          <button class="btn ghost" id="pass-cancel">Cancel</button>
          <button class="btn primary" id="pass-ok">OK</button>
        </div>
      </div>
    </div>
  </div>

  <script src="templates.js"></script>
  <script src="docs.js"></script>
  <script src="app.js"></script>
</body>
</html>
