name: Build & Test

on:
  push:
    branches: [master, "claude/**"]
  pull_request:
    branches: [master]

jobs:
  test:
    name: ${{ matrix.os }} / Rust stable
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Linux desktop deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev libxkbcommon-dev libwayland-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxcb-cursor-dev libx11-dev libxi-dev

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace --release

      - name: Test
        run: cargo test --workspace --no-fail-fast

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Headless XOR demo
        run: cargo run --release -- --xor-demo
