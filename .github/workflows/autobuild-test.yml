name: Autobuild Test App

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Run Tests
      run: npm test

    - name: Build Application
      run: npm run build:win

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: NeuralCity-Build
        path: dist/NeuralCity-Setup-*.exe
        retention-days: 30
